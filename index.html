<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>P2 English Oral Star Challenge</title>
    <style>
        :root {
            --primary: #4CAF50;
            --secondary: #2196F3;
            --bg: #F0F9FF;
            --star-color: #FFD700;
        }

        body {
            font-family: 'Comic Sans MS', 'Helvetica Neue', sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            -webkit-user-select: none;
        }

        /* 頂部導航 */
        .header {
            width: 100%;
            background: white;
            padding: 15px 0;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            font-size: 24px;
            font-weight: bold;
            color: var(--secondary);
        }

        /* 題目清單區 */
        #menu-zone {
            width: 90%;
            max-width: 600px;
            margin-top: 20px;
            padding-bottom: 50px;
        }

        .item-card {
            background: white;
            margin: 10px 0;
            padding: 20px;
            border-radius: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
            font-size: 24px;
            cursor: pointer;
        }

        .star-display { color: var(--star-color); font-size: 20px; }

        /* 練習區 */
        #practice-zone {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1;
            width: 100%;
        }

        .sentence-display {
            font-size: 50px;
            font-weight: bold;
            margin: 30px 20px;
            text-align: center;
        }

        .star-feedback {
            font-size: 60px;
            height: 80px;
            color: var(--star-color);
        }

        .btn-group { display: flex; gap: 30px; margin-top: 20px; }

        .circle-btn {
            width: 120px; height: 120px; border-radius: 50%; border: none;
            font-size: 45px; color: white; cursor: pointer;
            box-shadow: 0 6px 12px rgba(0,0,0,0.2);
        }

        #btn-listen { background-color: var(--secondary); }
        #btn-record { background-color: #F44336; }
        
        .nav-btn {
            margin-top: 40px; padding: 15px 40px; font-size: 22px;
            border-radius: 30px; border: none; background: var(--primary);
            color: white; cursor: pointer;
        }

        .hidden { display: none; }
        
        /* 載入中 */
        #loading { font-size: 24px; margin-top: 100px; }
    </style>
</head>
<body>

    <div class="header">🌟 P2 English Challenge</div>

    <div id="loading">Loading lessons...</div>

    <div id="menu-zone" class="hidden">
        <p style="text-align:center; color:#666;">Choose a word to practice:</p>
        <div id="item-list"></div>
        <button class="nav-btn" onclick="showReport()" style="width:100%; background:#9C27B0;">View My Stars 🏆</button>
    </div>

    <div id="practice-zone">
        <div class="star-feedback" id="star-result"></div>
        <div class="sentence-display" id="current-text"></div>
        
        <div class="btn-group">
            <button class="circle-btn" id="btn-listen" onclick="playAudio()">🔊</button>
            <button class="circle-btn" id="btn-record" onclick="startRecording()">🎤</button>
        </div>

        <button class="nav-btn" onclick="backToMenu()">Back to List</button>
    </div>

    <script>
        // 老師請在此更換您的 Google CSV 網址
        const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRJ13yt6GiMw7ehCCTl2Af9hu2vlRNXbI3MF1KG9jBhUL2YMYRNdlmdL_cJWkTi8YVMeq8X4VaBXJL8/pub?output=csv"; 
        
        let dataStore = []; // 格式: {text: "apple", stars: 0}
        let currentIndex = -1;

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const synth = window.speechSynthesis;
        let recognition;

        window.onload = () => {
            fetchData();
        };

        function fetchData() {
            if (CSV_URL === "您的CSV網址") {
                // 預設測試資料
                setupData(["Reading", "Swimming", "Playing Football", "I like skipping"]);
            } else {
                fetch(CSV_URL)
                    .then(res => res.text())
                    .then(text => {
                        const lines = text.split('\n').map(l => l.trim()).filter(l => l !== "");
                        setupData(lines);
                    })
                    .catch(() => alert("Error loading data."));
            }
        }

        function setupData(items) {
            dataStore = items.map(item => ({ text: item, stars: 0 }));
            document.getElementById('loading').classList.add('hidden');
            renderMenu();
        }

        function renderMenu() {
            const listDiv = document.getElementById('item-list');
            listDiv.innerHTML = "";
            dataStore.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = 'item-card';
                card.onclick = () => startPractice(index);
                
                let starText = "⭐".repeat(item.stars) || "未練習";
                card.innerHTML = `<span>${item.text}</span><span class="star-display">${starText}</span>`;
                listDiv.appendChild(card);
            });
            document.getElementById('menu-zone').classList.remove('hidden');
            document.getElementById('practice-zone').style.display = 'none';
        }

        function startPractice(index) {
            currentIndex = index;
            document.getElementById('menu-zone').classList.add('hidden');
            document.getElementById('practice-zone').style.display = 'flex';
            document.getElementById('current-text').innerText = dataStore[index].text;
            document.getElementById('star-result').innerText = "";
            
            if (SpeechRecognition && !recognition) {
                recognition = new SpeechRecognition();
                recognition.lang = 'en-US';
                recognition.onresult = (e) => handleResult(e.results[0][0].transcript);
                recognition.onend = () => document.getElementById('btn-record').style.opacity = "1";
            }
        }

        function playAudio() {
            const utter = new SpeechSynthesisUtterance(dataStore[currentIndex].text);
            utter.lang = 'en-US';
            utter.rate = 0.8;
            synth.speak(utter);
        }

        function startRecording() {
            document.getElementById('btn-record').style.opacity = "0.3";
            recognition.start();
        }

        function handleResult(speech) {
            const target = dataStore[currentIndex].text.toLowerCase().replace(/[.,?!]/g, "");
            const heard = speech.toLowerCase().replace(/[.,?!]/g, "");
            
            let stars = 0;
            if (heard === target) {
                stars = 3; // 完全正確
            } else if (heard.includes(target) || target.includes(heard)) {
                stars = 2; // 部分包含
            } else {
                stars = 1; // 有聲音但辨識不佳
            }

            dataStore[currentIndex].stars = Math.max(dataStore[currentIndex].stars, stars);
            document.getElementById('star-result').innerText = "⭐".repeat(stars);
            
            // 語音回饋
            const feedbackMsg = stars === 3 ? "Excellent!" : (stars === 2 ? "Good Job!" : "Try again.");
            synth.speak(new SpeechSynthesisUtterance(feedbackMsg));
        }

        function backToMenu() {
            renderMenu();
        }

        function showReport() {
            const totalStars = dataStore.reduce((sum, item) => sum + item.stars, 0);
            const maxStars = dataStore.length * 3;
            alert(`You got ${totalStars} / ${maxStars} stars! Keep it up!`);
        }
    </script>
</body>
</html>
