<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>P2 English Reading Challenge</title>
    <style>
        :root {
            --primary: #4CAF50;
            --secondary: #2196F3;
            --bg: #F0F9FF;
            --star-color: #FFD700;
            --record-active: #FF9800;
        }

        body {
            font-family: 'Comic Sans MS', 'Helvetica Neue', sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            -webkit-user-select: none;
        }

        .header {
            width: 100%;
            background: white;
            padding: 15px 0;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            font-size: 24px;
            font-weight: bold;
            color: var(--secondary);
        }

        #menu-zone {
            width: 90%;
            max-width: 600px;
            margin-top: 20px;
            padding-bottom: 50px;
        }

        .item-card {
            background: white;
            margin: 12px 0;
            padding: 22px;
            border-radius: 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
            font-size: 22px;
            cursor: pointer;
        }

        .star-display { color: var(--star-color); font-size: 20px; font-weight: bold; }

        /* 練習區優化 */
        #practice-zone {
            display: none;
            flex-direction: column;
            align-items: center;
            width: 100%;
            padding: 20px 0;
            box-sizing: border-box;
        }

        .sentence-container {
            width: 90%;
            max-height: 30vh; /* 防止太長遮住按鈕 */
            overflow-y: auto;
            margin: 20px 0;
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.05);
        }

        .sentence-display {
            font-size: 32px; /* 讀段落時字體縮小一點點以容納更多字 */
            font-weight: bold;
            text-align: left;
            color: #333;
            line-height: 1.5;
        }

        .timer-hint {
            font-size: 18px;
            color: #F44336;
            margin-bottom: 10px;
            font-weight: bold;
            height: 25px;
        }

        .star-feedback {
            font-size: 80px;
            height: 100px;
            color: var(--star-color);
        }

        .btn-group { display: flex; gap: 40px; margin-top: 10px; }

        .circle-btn {
            width: 120px; height: 120px; border-radius: 50%; border: none;
            font-size: 45px; color: white; cursor: pointer;
            box-shadow: 0 8px 15px rgba(0,0,0,0.2);
            display: flex; align-items: center; justify-content: center;
        }

        #btn-listen { background-color: var(--secondary); }
        #btn-record { background-color: #F44336; }
        
        .nav-btn {
            margin-top: 30px; padding: 15px 40px; font-size: 22px;
            border-radius: 35px; border: none; background: var(--primary);
            color: white; cursor: pointer; font-weight: bold;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="header">🌟 P2 Reading Challenge</div>

    <div id="loading" style="margin-top:50px;">🔄 Loading...</div>

    <div id="menu-zone" class="hidden">
        <div id="item-list"></div>
        <button class="nav-btn" onclick="showReport()" style="width:100%; background:#9C27B0; margin-top:30px;">Total Stars 🏆</button>
    </div>

    <div id="practice-zone">
        <div class="star-feedback" id="star-result"></div>
        <div class="timer-hint" id="timer-hint"></div>
        
        <div class="sentence-container">
            <div class="sentence-display" id="current-text"></div>
        </div>
        
        <div class="btn-group">
            <button class="circle-btn" id="btn-listen" onclick="playAudio()">🔊</button>
            <button class="circle-btn" id="btn-record" onclick="startRecording()">🎤</button>
        </div>

        <button class="nav-btn" onclick="backToMenu()">Back to List</button>
    </div>

    <script>
        // ★★★ 請將下面換成您的 Google CSV 網址 ★★★
        const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRJ13yt6GiMw7ehCCTl2Af9hu2vlRNXbI3MF1KG9jBhUL2YMYRNdlmdL_cJWkTi8YVMeq8X4VaBXJL8/pub?output=csv"; 
        
        let dataStore = []; 
        let currentIndex = -1;
        let recordingTimer;
        let countdownValue = 30; // 設定為 30 秒
        let countdownInterval;

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const synth = window.speechSynthesis;
        let recognition;

        window.onload = fetchData;

        function fetchData() {
            if (CSV_URL === "您的CSV網址" || CSV_URL === "") {
                setupData(["Hi, I am a student.", "I like reading books every day in the library.", "The quick brown fox jumps over the lazy dog."]);
            } else {
                fetch(CSV_URL).then(res => res.text()).then(text => {
                    const lines = text.split('\n').map(l => l.trim()).filter(l => l !== "");
                    setupData(lines);
                }).catch(() => { document.getElementById('loading').innerText = "❌ Error"; });
            }
        }

        function setupData(items) {
            dataStore = items.map(item => ({ text: item, stars: 0 }));
            document.getElementById('loading').classList.add('hidden');
            renderMenu();
        }

        function renderMenu() {
            const listDiv = document.getElementById('item-list');
            listDiv.innerHTML = "";
            dataStore.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = 'item-card';
                card.onclick = () => startPractice(index);
                let starText = item.stars > 0 ? "⭐".repeat(item.stars) : "New 📝";
                card.innerHTML = `<span style="flex:1; text-align:left; margin-right:10px;">${item.text.substring(0,25)}...</span><span class="star-display">${starText}</span>`;
                listDiv.appendChild(card);
            });
            document.getElementById('menu-zone').classList.remove('hidden');
            document.getElementById('practice-zone').style.display = 'none';
        }

        function startPractice(index) {
            currentIndex = index;
            document.getElementById('menu-zone').classList.add('hidden');
            document.getElementById('practice-zone').style.display = 'flex';
            document.getElementById('current-text').innerText = dataStore[index].text;
            document.getElementById('star-result').innerText = "";
            document.getElementById('timer-hint').innerText = "";
            
            if (SpeechRecognition && !recognition) {
                recognition = new SpeechRecognition();
                recognition.lang = 'en-US';
                recognition.continuous = true; // 開啟連續模式以支援長段落
                recognition.interimResults = false;

                recognition.onresult = (e) => {
                    stopTimers();
                    handleResult(e.results[e.results.length - 1][0].transcript);
                };
                recognition.onend = resetRecordButton;
            }
        }

        function playAudio() {
            synth.cancel();
            const utter = new SpeechSynthesisUtterance(dataStore[currentIndex].text);
            utter.lang = 'en-US';
            utter.rate = 0.75;
            synth.speak(utter);
        }

        function startRecording() {
            const btn = document.getElementById('btn-record');
            btn.style.backgroundColor = "var(--record-active)";
            btn.innerText = "Listening";
            
            try {
                recognition.start();
                startTimers();
            } catch (e) {
                recognition.stop();
            }
        }

        function startTimers() {
            countdownValue = 30; // 30秒倒計時
            document.getElementById('timer-hint').innerText = `Time left: ${countdownValue}s`;
            
            clearInterval(countdownInterval);
            countdownInterval = setInterval(() => {
                countdownValue--;
                document.getElementById('timer-hint').innerText = `Time left: ${countdownValue}s`;
                if (countdownValue <= 0) {
                    recognition.stop();
                    stopTimers();
                }
            }, 1000);

            clearTimeout(recordingTimer);
            recordingTimer = setTimeout(() => {
                recognition.stop();
            }, 30000); 
        }

        function stopTimers() {
            clearInterval(countdownInterval);
            clearTimeout(recordingTimer);
            document.getElementById('timer-hint').innerText = "";
        }

        function resetRecordButton() {
            const btn = document.getElementById('btn-record');
            btn.style.backgroundColor = "#F44336";
            btn.innerText = "🎤";
        }

        function handleResult(speech) {
            const target = dataStore[currentIndex].text.toLowerCase().replace(/[.,?!]/g, "");
            const heard = speech.toLowerCase().replace(/[.,?!]/g, "");
            
            let stars = 0;
            // 針對長段落的寬鬆評分邏輯
            if (heard === target) {
                stars = 3;
            } else if (heard.length > target.length * 0.5) {
                stars = 2; // 讀超過一半就算 Good
            } else if (heard.length > 0) {
                stars = 1;
            }

            dataStore[currentIndex].stars = Math.max(dataStore[currentIndex].stars, stars);
            document.getElementById('star-result').innerText = "⭐".repeat(stars);
            synth.speak(new SpeechSynthesisUtterance(stars >= 2 ? "Great job!" : "Try again."));
        }

        function backToMenu() { renderMenu(); }
        function showReport() {
            const total = dataStore.reduce((s, i) => s + i.stars, 0);
            alert(`Total Stars: ${total} / ${dataStore.length * 3} 🏆`);
        }
    </script>
</body>
</html>
